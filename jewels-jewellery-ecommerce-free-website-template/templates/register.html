<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Entelechy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:wght@400;500;600;700&family=Sofia+Sans:ital,wght@0,1..1000;1,1..1000&display=swap" rel="stylesheet">
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, rgba(243, 232, 220, 0.96), rgba(255, 249, 243, 0.9));
      }
      .auth-card {
        background: rgba(255, 253, 249, 0.96);
        border: 1px solid rgba(94, 71, 52, 0.12);
        border-radius: 30px;
        box-shadow: 0 24px 50px rgba(94, 71, 52, 0.10);
        overflow: hidden;
      }
      .auth-visual {
        background: linear-gradient(160deg, rgba(94, 71, 52, 0.75), rgba(197, 167, 136, 0.35)), url('{{ url_for('static', filename='images/banner-image3.jpg') }}') center/cover;
        min-height: 100%;
      }
      .auth-input {
        border-radius: 18px;
        padding: 0.9rem 1rem;
        border: 1px solid rgba(94, 71, 52, 0.15);
      }
      .auth-btn {
        border-radius: 999px;
        padding: 0.9rem 1rem;
      }
    </style>
  </head>
  <body class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-xl-11">
          <div class="auth-card">
            <div class="row g-0">
              <div class="col-lg-4 d-none d-lg-block">
                <div class="auth-visual p-5 text-white d-flex flex-column justify-content-end h-100">
                  <img src="{{ url_for('static', filename='images/Entelechy_Logo.png') }}" alt="Entelechy logo" style="width: 150px;" class="mb-4">
                  <h2 class="display-6 mb-3">Create your Entelechy account.</h2>
                  <p class="mb-0">Save your details, track your orders, and build your own jewellery wishlist.</p>
                </div>
              </div>
              <div class="col-lg-8">
                <div class="p-4 p-md-5">
                  <p class="text-uppercase mb-2" style="letter-spacing: 0.08em; color: #8a6c54;">Join Us</p>
                  <h1 class="display-5 mb-3">Register</h1>
                  <p class="text-muted mb-4">Create your account to start shopping with a personalised experience.</p>
                  <form method="POST" action="/register">
                    <div class="mb-3">
                      <input type="text" name="username" placeholder="Username" class="form-control auth-input" required>
                    </div>
                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <input type="text" name="first_name" placeholder="First Name" class="form-control auth-input" required>
                      </div>
                      <div class="col-md-6 mb-3">
                        <input type="text" name="last_name" placeholder="Last Name" class="form-control auth-input" required>
                      </div>
                    </div>
                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <input type="email" name="email" placeholder="Email" class="form-control auth-input" required>
                      </div>
                      <div class="col-md-6 mb-3">
                        <input type="password" name="password" placeholder="Password" class="form-control auth-input" required>
                      </div>
                    </div>
                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <input type="text" name="phone" placeholder="Phone" class="form-control auth-input">
                      </div>
                      <div class="col-md-6 mb-3">
                        <select name="gender" class="form-control auth-input" required>
                          <option value="">Select Gender</option>
                          <option value="Male">Male</option>
                          <option value="Female">Female</option>
                          <option value="Other">Other</option>
                        </select>
                      </div>
                    </div>
                    <div class="mb-3">
                      <textarea name="address" placeholder="Address" class="form-control auth-input" rows="4" required></textarea>
                    </div>
                    <div class="mb-4">
                      <input type="text" name="profile_picture" placeholder="Profile Picture URL (optional)" class="form-control auth-input">
                    </div>
                    <button type="submit" class="btn btn-dark w-100 auth-btn">Register</button>
                  </form>
                  <p class="text-center mt-4 mb-0">
                    Already have an account? <a href="/login" class="text-dark fw-semibold">Login</a>
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
