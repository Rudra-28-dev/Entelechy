<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subadmin Register</title>
    <style>
        :root {
            --bg: #f7f1e8;
            --panel: #fffaf4;
            --accent: #b8894f;
            --accent-dark: #8f6838;
            --text: #2f2418;
            --muted: #7a6755;
            --border: #e7d8c7;
            --shadow: 0 20px 45px rgba(84, 59, 29, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at bottom right, rgba(184, 137, 79, 0.18), transparent 30%),
                linear-gradient(135deg, #fbf7f0 0%, #f2e7d6 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(480px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 26px;
            box-shadow: var(--shadow);
            padding: 38px 34px;
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.24em;
            color: var(--accent);
            font: 600 12px/1.4 Arial, sans-serif;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 38px;
            font-weight: 500;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font: 600 13px/1.4 Arial, sans-serif;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: #fff;
            font: 14px Arial, sans-serif;
            margin-bottom: 18px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(184, 137, 79, 0.14);
        }

        button {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 15px 18px;
            background: linear-gradient(135deg, var(--accent) 0%, #d3ab73 100%);
            color: #fff;
            font: 700 14px Arial, sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
        }

        button:hover {
            background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
        }

        .link-row {
            margin-top: 18px;
            text-align: center;
            font: 14px Arial, sans-serif;
            color: var(--muted);
        }

        .link-row a {
            color: var(--accent-dark);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <script>alert({{ messages[0][1] | tojson }});</script>
        {% endif %}
    {% endwith %}

    <div class="card">
        <div class="eyebrow">Admin Panel</div>
        <h1>Create Subadmin</h1>
        <p>Register a product manager account for maintaining your jewellery collection and stock.</p>

        <form method="POST" action="/subadmin/register">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter a username" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a password" required>

            <button type="submit">Register</button>
        </form>

        <div class="link-row">
            Already have access? <a href="/subadmin/login">Login here</a>
        </div>
    </div>
</body>
</html>
